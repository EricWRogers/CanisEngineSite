<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Canis Handbook</title>
    <meta name="description" content="Canis contributor handbook for onboarding, workflows, and engine reference.">
    <link rel="icon" type="image/png" href="./assets/engine_icon.png">
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div class="site-shell">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar__brand">
                <div class="sidebar__crest">
                    <img src="./assets/engine_icon.png" alt="Canis engine icon">
                </div>
                <div>
                    <p class="eyebrow">Contributor Handbook</p>
                    <h1>Canis</h1>
                </div>
            </div>

            <div class="sidebar__intro">
                <p>A practical guide for new people learning how to build, navigate, and extend Canis.</p>
                <div class="version-chip">Getting started</div>
            </div>

            <label class="search-field" for="docs-search">
                <span>Search pages</span>
                <input id="docs-search" type="search" placeholder="Build, Inspector, Prefabs">
            </label>

            <nav class="sidebar__nav" id="docs-nav" aria-label="Documentation"></nav>
        </aside>

        <main class="main-panel">
            <header class="topbar">
                <button class="menu-toggle" id="menu-toggle" aria-expanded="false" aria-controls="sidebar">Menu</button>
                <div class="topbar__copy">
                    <p class="eyebrow">Onboarding and reference</p>
                    <h2 id="page-kicker">Build, learn, and extend Canis</h2>
                </div>
                <a class="topbar__link" id="page-source-link" href="../engine-guide.md" target="_blank" rel="noreferrer" hidden>Read source markdown</a>
            </header>

            <div class="content-grid">
                <article class="doc-page" id="doc-page"></article>
                <aside class="toc-panel" id="toc-panel">
                    <p class="eyebrow">On this page</p>
                    <nav id="toc"></nav>
                </aside>
            </div>
        </main>
    </div>

    <script src="./app.js"></script>
</body>
</html>
